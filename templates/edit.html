{% extends 'base.html' %}

{% block title %}Editar Tarea - TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        
        <!-- Botón de retorno -->
        <a href="{{ url_for('index') }}" class="btn btn-link text-decoration-none text-secondary mb-3 ps-0 d-inline-flex align-items-center">
            <i class="bi bi-arrow-left-short fs-4 me-1"></i>Volver al Tablero
        </a>
        
        <!-- Tarjeta de Edición -->
        <div class="card border-0 shadow-sm p-4 card-form">
            <h4 class="fw-bold text-dark mb-4 d-flex align-items-center">
                <i class="bi bi-pencil-fill text-purple-glow me-2"></i>Editar Detalles de la Tarea
            </h4>
            
            <form action="{{ url_for('edit_task', task_id=task.id) }}" method="POST">
                
                <!-- Título -->
                <div class="mb-3">
                    <label for="title" class="form-label fw-medium text-secondary">Título de la Tarea <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ task.title }}" required autocomplete="off">
                </div>
                
                <!-- Descripción -->
                <div class="mb-3">
                    <label for="description" class="form-label fw-medium text-secondary">Descripción</label>
                    <textarea class="form-control" id="description" name="description" rows="4" placeholder="Agrega más detalles sobre esta tarea...">{{ task.description or '' }}</textarea>
                </div>
                
                <div class="row g-3 mb-3">
                    <!-- Prioridad -->
                    <div class="col-6">
                        <label for="priority" class="form-label fw-medium text-secondary">Prioridad</label>
                        <select class="form-select" id="priority" name="priority">
                            {% for prio in priorities %}
                                <option value="{{ prio }}" {% if task.priority == prio %}selected{% endif %}>{{ prio }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <!-- Categoría -->
                    <div class="col-6">
                        <label for="category" class="form-label fw-medium text-secondary">Categoría</label>
                        <select class="form-select" id="category" name="category">
                            {% for cat in categories %}
                                <option value="{{ cat }}" {% if task.category == cat %}selected{% endif %}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <!-- Fecha de Vencimiento -->
                <div class="mb-3">
                    <label for="due_date" class="form-label fw-medium text-secondary">Fecha de Vencimiento</label>
                    <input type="date" class="form-control" id="due_date" name="due_date" value="{{ task.due_date or '' }}">
                </div>
                
                <!-- Estado de Completado (Switch Moderno) -->
                <div class="mb-4">
                    <div class="form-check form-switch p-3 bg-light rounded-3 d-flex align-items-center justify-content-between">
                        <div>
                            <label class="form-check-label fw-medium text-dark ms-0" for="completed">Marcar como completada</label>
                            <div class="small text-muted">¿Has finalizado esta tarea?</div>
                        </div>
                        <input class="form-check-input fs-5 me-1" type="checkbox" role="switch" id="completed" name="completed" {% if task.completed %}checked{% endif %}>
                    </div>
                </div>
                
                <!-- Acciones del Formulario -->
                <div class="d-flex gap-2">
                    <a href="{{ url_for('index') }}" class="btn btn-light w-50 py-2.5 fw-semibold border">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary-gradient w-50 py-2.5 fw-semibold text-white">
                        Guardar Cambios
                    </button>
                </div>
                
            </form>
        </div>
        
    </div>
</div>
{% endblock %}
